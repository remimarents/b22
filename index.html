<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <title>Miljøterapeuttur</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #a0d8f1;
    }

    #splash {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #splash img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }

    #overlay {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: #000c;
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: sans-serif;
      font-size: 20px;
      z-index: 999;
    }

    #hs {
      position: absolute;
      top: 5px;
      right: 5px;
      background: #fff8;
      padding: 10px;
      border-radius: 4px;
      font-family: sans-serif;
      font-size: 14px;
      line-height: 1.25;
      max-width: min(44vw, 280px);
      white-space: pre-line;
      z-index: 20;
    }

    #overlayHS {
      background: #0f2027;
      color: #00ffcc;
      font-family: 'Courier New', monospace;
      padding: 20px;
      margin-top: 30px;
      border: 4px double #00ffcc;
      width: 300px;
      text-align: left;
    }

    #overlayHS h2 {
      margin-top: 0;
      font-size: 24px;
      text-align: center;
      text-shadow: 0 0 5px #00ffcc;
    }

    #overlayHS ol {
      padding-left: 20px;
    }

    #overlayHS li {
      font-weight: bold;
      margin: 5px 0;
    }
    #shareModal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      font-family: sans-serif;
    }
    #shareCard {
      width: min(92vw, 360px);
      background: #fff;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      color: #111;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
    }
    #shareQr {
      width: 220px;
      height: 220px;
      margin: 12px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #shareUrl {
      font-size: 13px;
      word-break: break-all;
      color: #333;
    }

    button { font-size: 18px; padding: 10px 20px; margin-top: 10px; }
    input { font-size: 18px; padding: 5px; }
    label { display: block; margin-top: 5px; }

    @media (max-width: 480px) {
      #hs {
        top: 8px;
        right: 8px;
        font-size: 12px;
        padding: 8px;
        max-width: 46vw;
      }

      #overlay {
        font-size: 17px;
        padding: 10px;
        box-sizing: border-box;
      }

      #overlayHS {
        width: min(86vw, 320px);
        padding: 14px;
        margin-top: 18px;
      }

      #overlayHS h2 {
        font-size: 20px;
      }

      button, input {
        font-size: 16px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

<div id="splash">
  <img src="assets/splash.png" alt="Splash" />
</div>

<div id="hs">Highscore lastes...</div>

<div id="overlay">
  <div>Velg figur, og start.</div>

  <div>Velg kjønn på miljøterapeut (T):</div>
  <label><input type="radio" name="playerGender" value="m" checked> Mann</label>
  <label><input type="radio" name="playerGender" value="f"> Kvinne</label>

  <div>Velg kjønn på bruker (U):</div>
  <label><input type="radio" name="userGender" value="m" checked> Mann</label>
  <label><input type="radio" name="userGender" value="f"> Kvinne</label>

  <button id="startBtn">Start spillet</button>
  <div id="iosSoundHint" style="display:none; margin-top:8px; font-size:14px; color:#d1d5db;">
    Tips iPhone: Hvis du ikke horer lyd, skru av lydlos modus.
  </div>

  <div id="overlayHS">
    <h2>🏆 Highscore</h2>
    <ol id="overlayHSList">
      <li>Laster inn...</li>
    </ol>
  </div>

  <div style="position:absolute; bottom:10px; right:10px; font-size:12px; color:#aaa;">v1.3.24</div>
</div>

<div id="shareModal">
  <div id="shareCard">
    <h3>Del spillet</h3>
    <div id="shareQr"></div>
    <div id="shareUrl">https://terapisomvirker.no/b22/</div>
    <button id="closeShareBtn">Lukk</button>
  </div>
</div>

<script>
  const SHARE_URL = 'https://terapisomvirker.no/b22/';
  window.showShareQr = function showShareQr() {
    const modal = document.getElementById('shareModal');
    const qrHost = document.getElementById('shareQr');
    const imgUrl = 'assets/share_qr.png?v=1';
    qrHost.innerHTML = '<img alt="QR kode til spillet" width="220" height="220" src="' + imgUrl + '">';
    modal.style.display = 'flex';
  };

  document.getElementById('closeShareBtn').addEventListener('click', () => {
    document.getElementById('shareModal').style.display = 'none';
  });
  document.getElementById('shareModal').addEventListener('click', (e) => {
    if (e.target.id === 'shareModal') e.currentTarget.style.display = 'none';
  });

  const ua = navigator.userAgent || '';
  const isIOS = /iPhone|iPad|iPod/i.test(ua) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (isIOS) {
    const hint = document.getElementById('iosSoundHint');
    if (hint) hint.style.display = 'block';
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('overlay').style.display = 'flex';
    }, 4000);
  });
</script>

<script src="game.js?v=1.3.24"></script>
</body>
</html>
